<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Salesforce Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-grid"></div>

  <header>
    <div class="logo">⚡ SF<span>Connect</span></div>
    <div class="status-badge" id="statusBadge">● Desconectado</div>
  </header>

  <main>
    <section class="hero">
      <h1>Tu Salesforce,<br/><em>bajo control.</em></h1>
      <p>Consulta, crea y gestiona tus registros de Salesforce desde aquí.</p>
      <button class="btn-primary" onclick="conectar()">Conectar con Salesforce</button>
    </section>

    <section class="panel" id="panel" style="display:none">

      <div class="tabs">
        <button class="tab active" onclick="switchTab('contactos', this)">Contactos</button>
        <button class="tab" onclick="switchTab('cuentas', this)">Cuentas</button>
        <button class="tab" onclick="switchTab('oportunidades', this)">Oportunidades</button>
      </div>

      <div class="tab-content" id="tabContent">
        <div class="loading" id="loading">
          <div class="spinner"></div>
          <span>Cargando datos...</span>
        </div>
        <div id="dataContainer"></div>
      </div>

    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
